name: Release Packages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release-packages.yml'
      - 'model/**'
      - 'impl/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: release-packages
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish latest packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@pmh-only'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute release version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short=7 "$GITHUB_SHA")
          RELEASE_VERSION="0.0.${GITHUB_RUN_NUMBER}-sha.${SHORT_SHA}.attempt.${GITHUB_RUN_ATTEMPT}"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing release version: $RELEASE_VERSION"

      - name: Stamp package versions
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const releaseVersion = process.env.RELEASE_VERSION

          function updatePackage(filePath, dependencyOverrides = {}) {
            const pkg = JSON.parse(fs.readFileSync(filePath, 'utf8'))
            pkg.version = releaseVersion
            if (pkg.dependencies) {
              for (const [name, version] of Object.entries(dependencyOverrides)) {
                pkg.dependencies[name] = version
              }
            }
            fs.writeFileSync(filePath, `${JSON.stringify(pkg, null, 2)}\n`)
          }

          updatePackage('model/package.json')
          updatePackage('impl/welstory_plus/package.json', {
            '@pmh-only/welplan2-model': releaseVersion
          })
          updatePackage('impl/planeat_choice/package.json', {
            '@pmh-only/welplan2-model': releaseVersion
          })
          NODE

      - name: Build publishable packages
        run: pnpm build

      - name: Publish model package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @pmh-only/welplan2-model publish --tag latest --no-git-checks

      - name: Publish Welstory package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @pmh-only/welplan2-welstory-plus publish --tag latest --no-git-checks

      - name: Publish PlanEAT package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @pmh-only/welplan2-planeat-choice publish --tag latest --no-git-checks
