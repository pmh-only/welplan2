name: Release Android APK and AAB

on:
  push:
    branches:
      - main
    paths:
      - 'pwabuild/**'
      - '.github/workflows/release-android-apk.yml'
  workflow_dispatch:
    inputs:
      upload_to_play:
        description: Upload the signed AAB to Google Play.
        required: true
        default: true
        type: boolean
      play_tracks:
        description: Google Play track(s), comma-separated.
        required: true
        default: internal
        type: string
      play_status:
        description: Google Play release status.
        required: true
        default: draft
        type: choice
        options:
          - draft
          - completed
          - inProgress
          - halted

concurrency:
  group: release-android-apk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release Android artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || test "${PIPESTATUS[1]}" -eq 0
          yes | sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;34.0.0" || test "${PIPESTATUS[1]}" -eq 0
          if [ ! -e "$ANDROID_HOME/bin" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest/bin" "$ANDROID_HOME/bin"
          fi

      - name: Check Google Play credentials
        if: ${{ github.event_name == 'push' || inputs.upload_to_play }}
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Set the GOOGLE_PLAY_SERVICE_ACCOUNT_JSON repository secret."
            exit 1
          fi

      - name: Decrypt signing keystore
        env:
          KEYSTORE_GPG_PASSPHRASE: ${{ secrets.KEYSTORE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$KEYSTORE_GPG_PASSPHRASE" ]; then
            echo "::error::Set the KEYSTORE_GPG_PASSPHRASE repository secret."
            exit 1
          fi
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$KEYSTORE_GPG_PASSPHRASE" \
            --output pwabuild/android.keystore \
            --decrypt pwabuild/android.keystore.gpg

      - name: Build signed Android artifacts
        working-directory: pwabuild
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/pwabuild/android.keystore
          ANDROID_KEYSTORE_PASSWORD: '123456'
          ANDROID_KEY_ALIAS: android
          ANDROID_KEY_PASSWORD: '123456'
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: ${{ github.run_number }}
        run: ./gradlew --no-daemon assembleRelease bundleRelease

      - name: Compute release metadata
        id: release
        run: |
          TAG="v1.${GITHUB_RUN_NUMBER}"
          SAFE_TAG="${TAG//\//-}"
          APK_NAME="welplan-${SAFE_TAG}.apk"
          AAB_NAME="welplan-${SAFE_TAG}.aab"
          cp pwabuild/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          cp pwabuild/app/build/outputs/bundle/release/app-release.aab "$AAB_NAME"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "safe_tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "aab_name=$AAB_NAME" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            git log -1 --pretty=%s
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ steps.release.outputs.safe_tag }}
          path: |
            ${{ steps.release.outputs.apk_name }}
            ${{ steps.release.outputs.aab_name }}
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          APK_NAME: ${{ steps.release.outputs.apk_name }}
          AAB_NAME: ${{ steps.release.outputs.aab_name }}
          RELEASE_NOTES: ${{ steps.release.outputs.release_notes }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_NAME" "$AAB_NAME" --clobber
            gh release edit "$RELEASE_TAG" --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" "$APK_NAME" "$AAB_NAME" \
              --target "$GITHUB_SHA" \
              --title "Android $RELEASE_TAG" \
              --notes "$RELEASE_NOTES"
          fi

      - name: Upload AAB to Google Play
        if: ${{ github.event_name == 'push' || inputs.upload_to_play }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: codes.pmh.welplan.twa
          releaseFiles: ${{ steps.release.outputs.aab_name }}
          tracks: ${{ inputs.play_tracks || 'internal' }}
          status: ${{ inputs.play_status || 'draft' }}
          releaseName: ${{ steps.release.outputs.tag }}
