name: Release Android APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag. Defaults to android-<run-number>.
        required: false
        type: string

concurrency:
  group: release-android-apk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || test "${PIPESTATUS[1]}" -eq 0
          yes | sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;34.0.0" || test "${PIPESTATUS[1]}" -eq 0
          if [ ! -e "$ANDROID_HOME/bin" ]; then
            ln -s "$ANDROID_HOME/cmdline-tools/latest/bin" "$ANDROID_HOME/bin"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Bubblewrap
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"

      - name: Decrypt signing keystore
        env:
          KEYSTORE_GPG_PASSPHRASE: ${{ secrets.KEYSTORE_GPG_PASSPHRASE }}
        run: |
          if [ -z "$KEYSTORE_GPG_PASSPHRASE" ]; then
            echo "::error::Set the KEYSTORE_GPG_PASSPHRASE repository secret."
            exit 1
          fi
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$KEYSTORE_GPG_PASSPHRASE" \
            --output pwabuild/android.keystore \
            --decrypt pwabuild/android.keystore.gpg

      - name: Build signed APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: '123456'
          BUBBLEWRAP_KEY_PASSWORD: '123456'
        run: |
          pnpm --dir pwabuild exec bubblewrap build \
            --signingKeyPath ./android.keystore \
            --signingKeyAlias android

      - name: Compute release metadata
        id: release
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="$INPUT_TAG"
          if [ -z "$TAG" ]; then
            TAG="android-${GITHUB_RUN_NUMBER}"
          fi
          SAFE_TAG="${TAG//\//-}"
          APK_NAME="welplan-${SAFE_TAG}.apk"
          cp pwabuild/app-release-signed.apk "$APK_NAME"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          APK_NAME: ${{ steps.release.outputs.apk_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_NAME" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_NAME" \
              --target "$GITHUB_SHA" \
              --title "Android APK $RELEASE_TAG" \
              --notes "Signed APK built from $GITHUB_SHA."
          fi
