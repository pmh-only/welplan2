<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0f172a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#020617" />
    <meta name="application-name" content="Welplan" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="mask-icon" href="%sveltekit.assets%/favicon.svg" color="#10b981" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap"
      as="style"
      onload="
        this.onload = null
        this.rel = 'stylesheet'
      "
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Serif+KR:wght@400;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
