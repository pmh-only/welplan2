<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>네트워크 연결 없음 | Welplan</title>
    <style>
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --accent: #0f172a;
        --accent-soft: #38bdf8;
        --text: #0f172a;
        --muted: #475569;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 10% 0%, #e0f2fe, transparent 45%), var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      }

      .card {
        width: min(92vw, 580px);
        background: var(--surface);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.3rem;
      }

      p {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.6;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e0f2fe;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 600;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        margin-top: 4px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(90deg, var(--accent), #1d4ed8);
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.05);
      }

      .status {
        margin-top: 10px;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <span class="pill">오프라인</span>
      <h1>인터넷 연결이 없어 최근 캐시만 표시됩니다.</h1>
      <p>네트워크가 다시 연결되면 최신 메뉴 정보를 다시 불러올 수 있습니다. 잠시 후 네트워크 상태를 확인해 주세요.</p>
      <button type="button" id="retry">다시 연결 시도</button>
      <p class="status" id="status" aria-live="polite"></p>
    </main>
    <script>
      const status = document.getElementById('status')
      const retryButton = document.getElementById('retry')

      async function reloadWhenOnline () {
        status.textContent = '연결 상태를 확인하는 중입니다.'

        try {
          await fetch('/api/health', { cache: 'no-store' })
          const target = new URL(window.location.pathname === '/offline.html' ? '/' : window.location.href, window.location.origin)
          target.searchParams.set('__welplan_retry', Date.now().toString())
          window.location.replace(target)
        } catch {
          status.textContent = '아직 서버에 연결할 수 없습니다. 연결되면 자동으로 다시 시도합니다.'
        }
      }

      retryButton.addEventListener('click', reloadWhenOnline)
      window.addEventListener('online', reloadWhenOnline)

      if (navigator.onLine) {
        reloadWhenOnline()
      }
    </script>
  </body>
</html>
